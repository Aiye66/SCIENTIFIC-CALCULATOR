<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="calculator">
        <div class="display-container">
            <input type="text" id="display" disabled>
        </div>

        <div class="buttons">
            <!-- Top Controls -->
            <button class="control" onclick="clearDisplay()">C</button>
            <button class="control" onclick="deleteLast()">DEL</button>
            <button class="operator" onclick="append('%')">%</button>
            <button class="operator" onclick="append('/')">÷</button>

            <!-- Numbers -->
            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button class="operator" onclick="append('*')">×</button>

            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button class="operator" onclick="append('-')">−</button>

            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button class="operator" onclick="append('+')">+</button>

            <button class="zero" onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>
            <button class="equals" onclick="calculate()">=</button>

            <!-- Scientific -->
            <button class="scientific" onclick="sin()">sin</button>
            <button class="scientific" onclick="cos()">cos</button>
            <button class="scientific" onclick="tan()">tan</button>
            <button class="scientific" onclick="log()">log</button>
            <button class="scientific" onclick="sqrt()">√</button>
            <button class="scientific" onclick="power()">x²</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
